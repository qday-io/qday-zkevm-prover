name: Build fork.12 Linux image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag'
        required: true
        default: 'v8.0.0-RC16-fork.12'
  push:
    tags:
      - 'v8.0.0-RC16*'

jobs:
  build-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}-fork.12" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Executor 12
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile-GHA
          platforms: linux/amd64
          push: true
          target: executor
          tags: |
            hermeznetwork/zkevm-prover:${{ steps.tag.outputs.tag }}
          build-args: |
            ARG_PROVER_FORK_ID=12
          cache-from: type=gha
          cache-to: type=gha,mode=max
